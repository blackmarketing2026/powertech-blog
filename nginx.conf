# PowerTech Performance Blog - Nginx Configuration
# Platziere dies in: /etc/nginx/sites-available/blog.powertech-performance.com

server {
    listen 80;
    listen [::]:80;
    server_name blog.powertech-performance.com;

    root /var/www/powertech-blog;
    index index.shtml index.html;

    # Rewrite .shtml URLs to clean URLs
    # Converts /article-name.shtml to /article-name
    rewrite ^([a-zA-Z0-9\-]+)\.shtml$ /$1 permanent;
    
    # Serve .shtml files with clean URLs
    location ~ ^/([a-zA-Z0-9\-]+)/?$ {
        try_files $uri $uri.shtml $uri/ =404;
    }

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript;
    gzip_min_length 1000;

    # Caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(html|shtml)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 404 Error Page
    error_page 404 /404.html;
}
